name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -Eeuo pipefail

            on_error() {
              exit_code=$?
              echo "❌ Deployment failed while running: ${BASH_COMMAND}"
              echo "📋 Current docker compose status:"
              docker compose -f docker-compose.prod.yml ps || true
              echo "📋 Recent backend logs:"
              docker compose -f docker-compose.prod.yml logs --tail=120 backend || true
              echo "📋 Recent frontend logs:"
              docker compose -f docker-compose.prod.yml logs --tail=120 frontend || true
              exit "$exit_code"
            }

            trap on_error ERR

            echo "📦 Syncing latest code..."
            cd ~/DG-CRM
            git fetch --prune origin main
            git reset --hard origin/main

            echo "🧪 Validating docker compose configuration..."
            docker compose -f docker-compose.prod.yml config -q

            echo "🔨 Building backend..."
            docker compose -f docker-compose.prod.yml build backend
            docker rm -f $(docker ps -aq --filter "name=dg-crm-backend-1") 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d backend
            echo "✅ Backend redeployed"

            echo "🗄️  Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm backend npx prisma migrate deploy
            echo "✅ Migrations applied"

            echo "🔨 Building frontend..."
            docker compose -f docker-compose.prod.yml build frontend
            docker rm -f $(docker ps -aq --filter "name=dg-crm-frontend-1") 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d frontend
            echo "✅ Frontend redeployed"

            echo "🌐 Reloading nginx..."
            docker compose -f docker-compose.prod.yml up -d nginx

            echo "🎉 Deployment complete!"
            docker compose -f docker-compose.prod.yml ps

      - name: Deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment succeeded!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
