version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Port 5000 is internal only — Nginx proxies /api to it
    expose:
      - '5000'
    env_file:
      - ./backend/.env.production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://crm.dg-property.co.za/api
        NEXT_PUBLIC_SOCKET_URL: https://crm.dg-property.co.za
    restart: always
    # Port 3000 is internal only — Nginx proxies / to it
    expose:
      - '3000'
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done"

# Note: DATABASE_URL should target your managed PostgreSQL deployment.
