version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env.production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

# Note: In production, DATABASE_URL should target your managed PostgreSQL deployment.
